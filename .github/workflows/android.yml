name: Build Android APK

# Build a debug APK in the cloud (no local Android SDK needed).
# Run it manually from the GitHub "Actions" tab and pass the public API URL.
on:
  workflow_dispatch:
    inputs:
      api_base:
        description: 'Public API base URL (e.g. https://api.umfaris.example.com)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install client deps
        run: npm --prefix client install

      - name: Build web (with API base) and sync to Android
        env:
          VITE_API_BASE: ${{ inputs.api_base }}
        run: |
          npm --prefix client run build
          npm --prefix client run cap:sync

      - name: Build debug APK
        run: |
          cd client/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: umfaris-android-debug
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
