name: Build Android APK

# Builds the Capacitor Android APK in the cloud (no local Android SDK needed).
# Run it manually: GitHub repo -> Actions -> "Build Android APK" -> Run workflow.
# Then download the APK from the run's "Artifacts" and install it on your phone.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install web dependencies
        working-directory: client
        run: npm ci

      - name: Build web app
        working-directory: client
        run: npm run build

      - name: Sync Capacitor Android
        working-directory: client
        run: npx cap sync android

      - name: Build debug APK
        working-directory: client/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: umfaris-android
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
