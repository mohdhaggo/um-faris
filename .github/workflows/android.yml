name: Build Android APK

# Builds the Flutter Android APK in the cloud (no local Android SDK needed).
# Run it manually: GitHub repo -> Actions -> "Build Android APK" -> Run workflow.
# Then download the APK from the run's "Artifacts" and install it on your phone.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build release APK
        working-directory: app
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: umfaris-android
          path: app/build/app/outputs/flutter-apk/app-release.apk
