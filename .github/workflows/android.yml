name: Build Android APK

# Builds the Capacitor Android APK in the cloud (no local Android SDK needed).
# Run it manually: GitHub repo -> Actions -> "Build Android APK" -> Run workflow.
# Then download the APK from the run's "Artifacts" and install it on your phone.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install web dependencies
        working-directory: client
        run: npm ci

      - name: Build web app
        working-directory: client
        run: npm run build

      - name: Sync Capacitor Android
        working-directory: client
        run: npx cap sync android

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          # Strip any CR/LF/whitespace (Windows clipboards add them) before decoding.
          printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > "$RUNNER_TEMP/umfaris-release.keystore"
          echo "keystore size: $(stat -c%s "$RUNNER_TEMP/umfaris-release.keystore") bytes"

      - name: Build signed release APK
        working-directory: client/android
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/umfaris-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: umfaris-android
          path: client/android/app/build/outputs/apk/release/app-release.apk
